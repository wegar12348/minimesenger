<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>misegesait — R&amp;DMESEGE</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="theme-modern" data-theme="modern">

  <!-- ========== AUTH SCREEN ========== -->
  <div id="auth-screen" class="screen active">
    <div class="auth-wrapper">

      <div class="auth-logo">
        <div class="logo-mark">
          <span class="logo-rd">R&amp;D</span><span class="logo-msg">MESEGE</span>
        </div>
        <p class="auth-tagline">misegesait · secure messaging</p>
      </div>

      <!-- Theme toggle -->
      <div class="auth-theme-toggle">
        <button id="theme-toggle-auth" class="theme-toggle-btn" title="Переключить тему">
          <span id="toggle-label-auth">⇄ Переключить стиль</span>
        </button>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Вход</button>
        <button class="tab-btn" data-tab="register">Регистрация</button>
      </div>

      <!-- Login Form -->
      <div id="tab-login" class="auth-form active">
        <div class="field-group">
          <label>Логин</label>
          <input type="text" id="login-username" placeholder="username" autocomplete="username" />
        </div>
        <div class="field-group">
          <label>Пароль</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button class="btn-primary" id="btn-login">Войти</button>
      </div>

      <!-- Register Form -->
      <div id="tab-register" class="auth-form">
        <div class="field-group">
          <label>Имя пользователя</label>
          <input type="text" id="reg-username" placeholder="username" autocomplete="username" />
        </div>
        <div class="field-group">
          <label>Отображаемое имя</label>
          <input type="text" id="reg-displayname" placeholder="Ваше имя" />
        </div>
        <div class="field-group">
          <label>Пароль</label>
          <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div id="reg-error" class="form-error hidden"></div>
        <button class="btn-primary" id="btn-register">Создать аккаунт</button>
      </div>

    </div>
  </div>

  <!-- ========== CHAT SCREEN ========== -->
  <div id="chat-screen" class="screen">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="logo-rd">R&amp;D</span><span class="logo-msg">M</span>
        </div>
        <div class="sidebar-actions">
          <button class="icon-btn" id="theme-toggle-chat" title="Переключить тему">⇄</button>
          <button class="icon-btn" id="btn-logout" title="Выйти">⏻</button>
        </div>
      </div>

      <!-- Current user info -->
      <div class="current-user-bar">
        <div class="avatar" id="my-avatar">?</div>
        <div class="user-meta">
          <span class="user-display" id="my-display-name">—</span>
          <span class="user-status online">● онлайн</span>
        </div>
      </div>

      <!-- Search -->
      <div class="search-box">
        <input type="text" id="user-search" placeholder="Поиск пользователей..." />
      </div>

      <div class="contacts-label">Пользователи</div>
      <div class="contacts-list" id="contacts-list">
        <div class="contacts-empty">Загрузка...</div>
      </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <main class="chat-area" id="chat-area">

      <!-- Empty state -->
      <div class="chat-empty" id="chat-empty">
        <div class="empty-logo">
          <span class="logo-rd">R&amp;D</span><span class="logo-msg">MESEGE</span>
        </div>
        <p>Выберите собеседника, чтобы начать диалог</p>
        <p class="empty-sub">misegesait · end-to-end encrypted</p>
      </div>

      <!-- Active chat view -->
      <div class="chat-view hidden" id="chat-view">

        <div class="chat-header">
          <button class="icon-btn back-btn" id="btn-back">←</button>
          <div class="chat-peer-info">
            <div class="avatar" id="peer-avatar">?</div>
            <div>
              <div class="chat-peer-name" id="peer-name">—</div>
              <div class="chat-peer-status" id="peer-status">—</div>
            </div>
          </div>
        </div>

        <div class="messages-container" id="messages-container"></div>

        <div class="chat-input-area">
          <textarea
            id="msg-input"
            placeholder="Напишите сообщение..."
            rows="1"
            maxlength="2000"
          ></textarea>
          <button class="btn-send" id="btn-send" title="Отправить">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <!-- Scripts (порядок важен) -->
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
